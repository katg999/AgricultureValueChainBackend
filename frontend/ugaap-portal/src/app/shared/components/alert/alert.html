<div
  class="alert"
  [class]="'alert-' + variant"
  *ngIf="visible">

  <div class="alert-icon">
    <span *ngIf="variant === 'info'">ℹ</span>
    <span *ngIf="variant === 'warning'">⚠</span>
    <span *ngIf="variant === 'danger'">✕</span>
    <span *ngIf="variant === 'success'">✓</span>
  </div>

  <div class="alert-content">
    <div class="alert-title" *ngIf="title">{{ title }}</div>
    <div class="alert-body">
      <ng-content></ng-content>
    </div>
  </div>

  <button
    class="alert-dismiss"
    *ngIf="dismissible"
    (click)="dismiss()"
    type="button">
    ✕
  </button>

</div>
