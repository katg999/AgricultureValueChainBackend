<div class="stat-card" [class]="'stat-card-' + variant">

    <!-- Loading state -->
    <div class="stat-loading" *ngIf="loading">
      <div class="skeleton skeleton-label"></div>
      <div class="skeleton skeleton-value"></div>
    </div>
  
    <!-- Content -->
    <div *ngIf="!loading">
      <div class="stat-label">{{ label }}</div>
      <div class="stat-value">{{ value }}</div>
      <div class="stat-trend" *ngIf="trend"
        [class.trend-up]="trendDirection === 'up'"
        [class.trend-down]="trendDirection === 'down'">
        <span *ngIf="trendDirection === 'up'">↑</span>
        <span *ngIf="trendDirection === 'down'">↓</span>
        {{ trend }}
      </div>
    </div>
  
  </div>
