<!-- logo.component.html -->

<div [class]="logoClasses">

  @if (variant === 'sidebar') {
    <!-- ── Sidebar variant: icon left, wordmark + sub-label stacked right ── -->
    <div class="logo-row">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 18C4 19.1046 4.89543 20 6 20C7.10457 20 8 19.1046 8 18C8 16.8954 7.10457 16 6 16C4.89543 16 4 16.8954 4 18Z" fill="white"/>
          <path d="M16 18C16 19.6569 17.3431 21 19 21C20.6569 21 22 19.6569 22 18C22 16.3431 20.6569 15 19 15C17.3431 15 16 16.3431 16 18Z" fill="white"/>
          <path d="M2 8H6V12H8V6H12V12H14V6C14 4.89543 13.1046 4 12 4H6C4.89543 4 4 4.89543 4 6V16H2V8Z" fill="white"/>
          <path d="M14 8H16V12H18L20 10V8H22V14H20L18 12H14V8Z" fill="white"/>
          <circle cx="6" cy="18" r="1" fill="white"/>
          <circle cx="19" cy="18" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="logo-wordmark">
        <span class="logo-text">UGAAP</span>
        <span class="logo-sub-label" *ngIf="showSubtitle">AGRI-FIN MANAGEMENT</span>
      </div>
    </div>

  } @else {
    <!-- ── Default variant: centered column layout for auth pages ─────── -->
    <div class="logo-row">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 18C4 19.1046 4.89543 20 6 20C7.10457 20 8 19.1046 8 18C8 16.8954 7.10457 16 6 16C4.89543 16 4 16.8954 4 18Z" fill="white"/>
          <path d="M16 18C16 19.6569 17.3431 21 19 21C20.6569 21 22 19.6569 22 18C22 16.3431 20.6569 15 19 15C17.3431 15 16 16.3431 16 18Z" fill="white"/>
          <path d="M2 8H6V12H8V6H12V12H14V6C14 4.89543 13.1046 4 12 4H6C4.89543 4 4 4.89543 4 6V16H2V8Z" fill="white"/>
          <path d="M14 8H16V12H18L20 10V8H22V14H20L18 12H14V8Z" fill="white"/>
          <circle cx="6" cy="18" r="1" fill="white" stroke="white" stroke-width="0.5"/>
          <circle cx="19" cy="18" r="1.5" fill="white" stroke="white" stroke-width="0.5"/>
        </svg>
      </div>
      <span class="logo-text">UGAAP</span>
    </div>
    <p class="logo-subtitle" *ngIf="showSubtitle">Uganda Agrarian Portal</p>
  }

</div>
