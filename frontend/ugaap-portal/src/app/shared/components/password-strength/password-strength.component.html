<!-- 
  Password Strength Component
  
  Visual strength indicator with progress bars
-->

<div class="password-strength" *ngIf="password">
  
  <!-- Strength Bars -->
  <div class="strength-bars">
    <div 
      *ngFor="let active of strengthBars; let i = index"
      class="strength-bar"
      [ngClass]="{
        'bar-active': active,
        'bar-weak': strength === 'weak' && active,
        'bar-medium': strength === 'medium' && active,
        'bar-strong': strength === 'strong' && active,
        'bar-very-strong': strength === 'very-strong' && active
      }">
    </div>
  </div>

  <!-- Strength Label -->
  <p class="strength-label" *ngIf="showLabel && strengthLabel">
    {{ strengthLabel }}
  </p>

</div>
