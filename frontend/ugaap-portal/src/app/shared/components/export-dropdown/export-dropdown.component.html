<div class="export-dropdown-wrapper">
  <button class="export-btn" (click)="toggle($event)" [class.loading]="loading" [disabled]="loading">
    @if (loading) {
      <span class="btn-spinner"></span>
      <span>Exporting...</span>
    } @else {
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span>Export</span>
      <svg class="chevron" [class.open]="isOpen" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    }
  </button>

  @if (isOpen) {
    <div class="dropdown-menu">
      <button class="dropdown-item" (click)="onExport('excel', $event)">
        <span class="item-icon icon-excel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="3" y1="15" x2="21" y2="15"/>
            <line x1="9" y1="9" x2="9" y2="21"/>
          </svg>
        </span>
        <div class="item-info">
          <span class="item-name">Excel (.xlsx)</span>
          <span class="item-desc">Spreadsheet with formatting</span>
        </div>
      </button>

      <button class="dropdown-item" (click)="onExport('pdf', $event)">
        <span class="item-icon icon-pdf">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </span>
        <div class="item-info">
          <span class="item-name">PDF (.pdf)</span>
          <span class="item-desc">Printable document format</span>
        </div>
      </button>

      <button class="dropdown-item" (click)="onExport('csv', $event)">
        <span class="item-icon icon-csv">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/>
            <line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </span>
        <div class="item-info">
          <span class="item-name">CSV (.csv)</span>
          <span class="item-desc">Raw data for analysis</span>
        </div>
      </button>

      <div class="dropdown-divider"></div>

      <button class="dropdown-item" (click)="onExport('print', $event)">
        <span class="item-icon icon-print">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
        </span>
        <div class="item-info">
          <span class="item-name">Print Report</span>
          <span class="item-desc">Send to printer</span>
        </div>
      </button>
    </div>
  }
</div>
