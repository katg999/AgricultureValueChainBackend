<!-- 
  Input Component Template
  
  Displays form input with label, validation, hints, and optional password toggle
  Supports both standalone and reactive forms usage
-->

<div class="input-field" [class.has-error]="error">
  
  <!-- Label row (with optional link) -->
  <div class="label-row" *ngIf="label">
    <label>
      {{ label }}
      <span class="required" *ngIf="required">*</span>
    </label>

    <!-- Optional link in label (e.g., "Forgot password?") -->
    <a *ngIf="labelLinkText" 
       [routerLink]="labelLinkRoute" 
       class="forgot-link">
       {{ labelLinkText }}
    </a>
  </div>

  <!-- Input wrapper (for absolute positioning of eye toggle) -->
  <div class="input-wrapper">
    
    <!-- Input element -->
    <input
      [type]="inputType"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [value]="value"
      (input)="onInput($event)"
      (blur)="onBlur()"
      [class.input-password]="type === 'password'"/>

    <!-- Password visibility toggle button -->
    <button
      *ngIf="type === 'password'"
      type="button"
      class="eye-toggle"
      (click)="togglePassword()"
      aria-label="Toggle password visibility">
      
      <!-- Eye icon (password hidden) -->
      <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>

      <!-- Eye-slash icon (password visible) -->
      <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1 -2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </button>
  </div>

  <!-- Helper text (shown when no error) -->
  <span class="hint" *ngIf="hint && !error">{{ hint }}</span>
  
  <!-- Error message (takes priority over hint) -->
  <span class="error-msg" *ngIf="error">{{ error }}</span>
  
</div>
