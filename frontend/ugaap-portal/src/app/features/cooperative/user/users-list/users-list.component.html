<div class="page">
  <div class="page-container">

    <div class="page-header">
      <app-button variant="primary" size="md" iconLeft="+" (clicked)="addNewUser()">
        Add new user
      </app-button>
    </div>

    <div class="stats-grid">
      <app-stats-card label="Total Users"     [value]="480" trend="+12%" icon="users"  variant="default"></app-stats-card>
      <app-stats-card label="Active Users"    [value]="304" trend="+8%"  icon="check"  variant="success"></app-stats-card>
      <app-stats-card label="Inactive Users"  [value]="103"              icon="alert"  variant="warning"></app-stats-card>
      <app-stats-card label="Locked Accounts" [value]="3"                icon="shield" variant="danger"></app-stats-card>
    </div>

    <div class="filters-bar">
      <div class="search-input">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="text" placeholder="Search by name, ID or manager..."
          [(ngModel)]="searchQuery" (input)="onSearch()"/>
      </div>
      <select class="filter-select" [(ngModel)]="selectedRole" (change)="onRoleFilterChange()">
        <option *ngFor="let r of roleOptions" [value]="r">{{ r }}</option>
      </select>
      <select class="filter-select" [(ngModel)]="selectedCooperation" (change)="onCooperationFilterChange()">
        <option *ngFor="let c of cooperationOptions" [value]="c">{{ c }}</option>
      </select>
    </div>

    <app-data-table
      [columns]="cols"
      [rows]="users"
      [paginate]="true"
      [clickable]="true"
      emptyIcon="users"
      emptyTitle="No users found"
      emptyMessage="Add a user to start managing your cooperative team."
      emptyActionLabel="Add User"
      emptyRoute="/cooperative/users/add-user"
      (rowClick)="onRowClicked($any($event))">

      <ng-template appCell="name" let-row>
        <div class="user-cell">
          <div class="user-avatar">{{ getUserInitials($any(row).name) }}</div>
          <span class="user-name">{{ $any(row).name }}</span>
        </div>
      </ng-template>

      <ng-template appCell="role" let-row>
        <app-badge [variant]="getRoleBadgeVariant($any(row).role)" size="sm">{{ $any(row).role }}</app-badge>
      </ng-template>

      <ng-template appCell="actions" let-row>
        <div class="actions-cell">
          <button class="action-btn" (click)="viewUser($any(row), $event)" title="View user">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 5C7 5 2.73 8.11 1 12.5 2.73 16.89 7 20 12 20s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5z" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
          <button class="action-btn" (click)="moreActions($any(row), $event)" title="More actions">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="5"  r="1.5" fill="currentColor"/>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
              <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </ng-template>

    </app-data-table>


  </div>
</div>
