<!-- async pipe subscribes to farmers$ and auto-unsubscribes on destroy.
     "as farmers" exposes the full list for KPI methods (newRegistrations, portfolioAtRisk). -->
<!-- Error banner — only visible when the API call failed (e.g. backend is down). -->
<div class="fetch-error" *ngIf="error && !loading">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
    <line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  {{ error }}
</div>

<div class="page-shell" *ngIf="farmers$ | async as farmers">
  

  <div class="filters-section">
    <div class="search-wrapper">
      <app-input
        label="Search"
        placeholder="Search by name, ID, branch, commodity, status or stage"
        type="text"
        [(ngModel)]="searchQuery"
        (ngModelChange)="applyFilter()">
      </app-input>
    </div>
  </div>

  <ng-container *ngIf="filteredFarmers$ | async as filteredFarmers">

    <app-data-table
      [columns]="cols"
      [rows]="filteredFarmers"
      [paginate]="true"
      emptyIcon="farmer"
      emptyTitle="No farmers found"
      emptyMessage="Farmers registered at branches will appear here. Try adjusting your search or filters.">

      <ng-template appCell="primaryCommodity" let-row>
        <span class="commodity-tag">{{ $any(row).primaryCommodity }}</span>
      </ng-template>

      <ng-template appCell="balance" let-row>
        <span
          class="text-bold"
          [ngClass]="{ 'text-danger-custom': $any(row).balance !== '0' && $any(row).balance !== '0.00' && $any(row).balance !== '--' }">
          {{ ($any(row).balance === '0' || $any(row).balance === '0.00') ? '--' : $any(row).balance }}
        </span>
      </ng-template>

      <ng-template appCell="status" let-row>
        <span class="status-badge" [ngClass]="$any(row).status.toLowerCase()">
          {{ $any(row).status }}
        </span>
      </ng-template>

      <ng-template appCell="actions" let-row>
        <div class="kebab-wrapper">
          <button
            class="kebab-btn"
            type="button"
            aria-label="Open actions menu"
            (click)="toggleMenu($any(row).id, $event)">
            &#8942;
          </button>
          <div class="kebab-dropdown" *ngIf="openMenuId === $any(row).id">
            <button class="kebab-item" type="button" (click)="onReviewFarmer($any(row))">
              Review
            </button>
            <ng-container *ngIf="$any(row).status === 'Pending'">
              <button class="kebab-item approve" type="button" (click)="onApproveFarmer($any(row))">
                Approve
              </button>
              <button class="kebab-item reject" type="button" (click)="onRejectFarmer($any(row))">
                Reject
              </button>
            </ng-container>
          </div>
        </div>
      </ng-template>

    </app-data-table>

  </ng-container>

</div>
