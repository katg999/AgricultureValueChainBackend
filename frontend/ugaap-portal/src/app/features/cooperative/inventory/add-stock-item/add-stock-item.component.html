<div class="add-stock-item-page-wrapper">
  <app-page-header
    title="Add Stock Item"
    subtitle="Add new input stock to the cooperative inventory."
    [breadcrumb]="['Inventory', 'Stock Available', 'Add Stock Item']">
  </app-page-header>

  <div class="form-container">

    <form [formGroup]="stockForm" (ngSubmit)="onSubmit()" class="stock-card">
      <h3>Stock Item Details</h3>

      <div class="form-grid">
        <div class="column">
          <div class="form-group">
            <label for="itemName">Item name</label>
            <select id="itemName" title="Item Name" formControlName="itemName" class="form-input">
              <option value="" disabled>Select from catalogue</option>
              <option value="maize">Maize Seeds</option>
              <option value="npk-fertilizer">NPK Fertilizer</option>
              <option value="urea-fertilizer">Urea Fertilizer</option>
            </select>
            <small class="helper-text">Select an existing item from the master catalogue.</small>
          </div>

          <div class="form-group">
            <label for="branch">Branch</label>
            <select id="branch" title="Branch" formControlName="branch" multiple class="form-input multi-select">
              <option value="kampala">Kampala</option>
              <option value="mbarara">Mbarara</option>
              <option value="jinja">Jinja</option>
            </select>
            <small class="helper-text">Hold Ctrl/Cmd to select multiple branches.</small>
          </div>

          <div class="form-group">
            <label for="quantity">Quantity to add</label>
            <div class="input-with-unit">
              <app-input
                id="quantity"
                type="number"
                formControlName="quantity"
                placeholder="0.00">
              </app-input>
              <span class="unit-tag">KG</span>
            </div>
          </div>
        </div>

        <div class="column">
          <div class="form-group">
            <label for="receivedDate">Received date</label>
            <app-input 
              id="receivedDate"
              type="date"
              formControlName="receivedDate"
              class="form-input">
            </app-input>
          </div>

          <div class="form-group">
            <label for="minThreshold">Minimum threshold</label>
            <div class="input-with-unit">
              <app-input
                id="minThreshold"
                type="number"
                formControlName="minThreshold"
                placeholder="0.00">
              </app-input>
              <span class="unit-tag">KG</span>
            </div>
            <small class="helper-text">Alert will be triggered when stock falls below this value.</small>
          </div>

          <div class="form-group">
            <label for="supplierName">Supplier name</label>
            <app-input
              id="supplierName"
              type="text"
              formControlName="supplierName"
              placeholder="Enter supplier name">
            </app-input>
          </div>

          <div class="form-group">
            <label for="batchReference">Batch reference</label>
            <app-input
              id="batchReference"
              type="text"
              formControlName="batchReference"
              placeholder="E.G. BTC-2024-MAZ-001">
            </app-input>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <app-button
          size="md"
          variant="secondary"
          type="button"
          (clicked)="onCancel()">
          <span>Cancel</span>
        </app-button>
        
        <app-button
          variant="primary"
          size="md"
          type="submit">
          <span class="icon">+</span> Add to stock
        </app-button>
      </div>
    </form>
  </div>
</div>
