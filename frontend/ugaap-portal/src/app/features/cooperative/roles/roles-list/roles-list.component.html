<div class="page">
  <div class="page-container">

    <div class="page-header">
      <div class="header-content">
        <h1 class="page-title">Roles &amp; Permissions</h1>
        <p class="page-subtitle">Manage user roles and assign granular permissions</p>
      </div>
      <app-button variant="primary" size="md" iconLeft="+" (clicked)="createNewRole()">
        Create new role
      </app-button>
    </div>

    <div class="search-bar">
      <div class="search-input-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          placeholder="Search roles..."
          [(ngModel)]="searchQuery"
        />
      </div>
    </div>

    <div class="roles-grid" *ngIf="filteredRoles.length > 0">
      <app-role-card
        *ngFor="let role of filteredRoles; trackBy: trackById"
        [role]="role"
        (cardClicked)="viewRole($event)"
        (editClicked)="editRole($event)"
        (deleteClicked)="deleteRole($event)">
      </app-role-card>
    </div>

    <div class="empty-state" *ngIf="filteredRoles.length === 0">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h3>No roles found</h3>
      <p>Try adjusting your search, or create a new role.</p>
    </div>

  </div>
</div>
