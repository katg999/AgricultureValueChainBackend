<!-- Branches & Collection Centres Component Template -->
<div class="page">
  <div class="page-container">
    <!-- Page Header -->
    <div class="page-header">
      <app-button
      variant="primary" 
      size="md" 
      (click)="RegisterBranch()">
        + Register branch
      </app-button>
    </div>

    <!-- Statistics Cards Grid -->
    <div class="stats-grid">
      <app-stats-card
        label="Total Active Branches"
        [value]="totalActiveBranches"
        icon="building"
        variant="success"
      ></app-stats-card>
      <app-stats-card
        label="Total Collection Centres"
        [value]="totalCentres"
        icon="box"
        variant="default"
      ></app-stats-card>
      <app-stats-card
        label="Total Farmer Base"
        [value]="totalFarmers"
        icon="users"
        trend="+8%"
        trendType="positive"
        variant="success"
      ></app-stats-card>
      <app-stats-card
        label="Assigned Field Agents"
        [value]="assignedAgents"
        icon="farmer"
        trend="+12 this month"
        trendType="positive"
        variant="default"
      ></app-stats-card>
    </div>

    <!-- Branch Network Table with Pagination -->
    <div class="table-container">
      <div class="card-header-row">
        <h2 class="card-title">Branch Network Overview</h2>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="filter-search">
          <svg class="filter-search-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6"/>
            <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input
            type="text"
            class="filter-input"
            placeholder="Search branch or location..."
            [(ngModel)]="searchQuery"
            (input)="applyFilter()"
          />
        </div>
        <div class="filter-select-wrap">
          <select title="Status filter" class="filter-select" [(ngModel)]="selectedStatus" (change)="applyFilter()">
            <option value="">All Statuses</option>
            <option value="ACTIVE">Active</option>
            <option value="PENDING">Pending</option>
          </select>
        </div>
      </div>
      <app-data-table
        [columns]="cols"
        [rows]="filteredBranches"
        [paginate]="true"
        [clickable]="true"
        emptyIcon="building"
        emptyTitle="No branches yet"
        emptyMessage="Register a branch to start managing your collection network."
        emptyActionLabel="Register Branch"
        emptyRoute="/cooperative/branches/onboarding"
        (rowClick)="onViewBranch($any($event))">

        <ng-template appCell="farmers" let-row>
          {{ $any(row).farmers | number }}
        </ng-template>

        <ng-template appCell="status" let-row>
          <span class="badge-status"
            [ngClass]="{ 'badge-active': $any(row).status === 'ACTIVE', 'badge-pending': $any(row).status === 'PENDING' }">
            {{ $any(row).status }}
          </span>
        </ng-template>

        <ng-template appCell="actions" let-row>
          <div class="kebab-container" [class.open]="activeMenuId === $any(row).id" (click)="$event.stopPropagation()">
            <button class="kebab-button" (click)="toggleMenu($any(row).id, $event)">⋮</button>
            <div class="kebab-menu" *ngIf="activeMenuId === $any(row).id">
              <button class="menu-item" (click)="onViewBranch($any(row), $event)">View</button>
              <button class="menu-item" (click)="onEditBranch($any(row), $event)">Edit</button>
            </div>
          </div>
        </ng-template>

      </app-data-table>

    </div>

    <!-- Recent Activity Table -->
    <div class="recent-card">
      <div class="card-header-row">
        <h2 class="card-title">Recent Activity</h2>
      </div>
      <table class="activity-table">
        <tbody>
          <tr *ngFor="let act of activities">
            <td class="activity-title-cell">
              <span class="activity-bullet-inline"></span>
              {{ act.title }}
            </td>
            <td class="activity-time-cell text-muted">{{ act.time }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Interactive Map Card -->
    <div class="map-card">
      <div class="map-icon"></div>
      <h3>Interactive Map</h3>
      <p>Visualize the geographic distribution of your collection network.</p>
      <app-button variant="secondary" size="md" (clicked)="openMapView()">
        Open Map View
      </app-button>
    </div>
  </div>
</div>
