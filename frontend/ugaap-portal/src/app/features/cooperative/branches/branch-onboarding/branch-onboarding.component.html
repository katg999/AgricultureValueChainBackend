<!--
  Branch Onboarding — numbered-section layout via app-form-shell + app-form-section.
  All fields validated together on "Register Branch" click.
-->

<form [formGroup]="branchForm">

  <app-form-shell title="New Branch" subtitle="Fill in all sections below, then register when ready.">

    <!-- ── 1. IDENTITY ── -->
    <app-form-section [number]="1" title="Identity" iconName="building"
                      desc="Official name and unique code for this branch">
      <div class="fields-grid cols-2">
        <app-input
          label="Branch Name"
          type="text"
          placeholder="e.g., Kasese District Branch"
          formControlName="branchName"
          [required]="true"
          [uppercase]="true"
          hint="Official name as it will appear in records"
          [error]="getFieldError('branchName')">
        </app-input>

        <app-input
          label="Registration Number"
          type="text"
          placeholder="e.g., KAS001"
          formControlName="branchRegistrationNumber"
          [required]="true"
          [uppercase]="true"
          hint="Uppercase letters and numbers only (e.g., KAS001)"
          [error]="getFieldError('branchRegistrationNumber')">
        </app-input>
      </div>
    </app-form-section>

    <!-- ── 2. LOCATION ── -->
    <app-form-section [number]="2" title="Location" iconName="location"
                      desc="Where this branch operates">
      <div class="fields-grid cols-4">
        <app-input
          label="Town / Area"
          type="text"
          placeholder="e.g., Kasese Town"
          formControlName="location"
          [required]="true"
          [uppercase]="true"
          hint="Town, district or area where the branch is based"
          [error]="getFieldError('location')">
        </app-input>

        <div class="input-group">
          <label class="input-label">Region <span class="required">*</span></label>
          <select title="region" formControlName="region" class="form-select"
                  [class.has-error]="branchForm.get('region')?.invalid && branchForm.get('region')?.touched">
            <option value="" disabled>Select region</option>
            <option value="Central Region">Central Region</option>
            <option value="Eastern Region">Eastern Region</option>
            <option value="Northern Region">Northern Region</option>
            <option value="Western Region">Western Region</option>
            <option value="South Western Region">South Western Region</option>
          </select>
          <span class="error-text"
                *ngIf="branchForm.get('region')?.invalid && branchForm.get('region')?.touched">
            Please select a region
          </span>
        </div>

        <div class="input-group">
          <label class="input-label">Country <span class="required">*</span></label>
          <select title="country" formControlName="country" class="form-select"
                  [class.has-error]="branchForm.get('country')?.invalid && branchForm.get('country')?.touched">
            <option value="" disabled>Select country</option>
            <option value="Algeria">Algeria</option>
            <option value="Angola">Angola</option>
            <option value="Benin">Benin</option>
            <option value="Botswana">Botswana</option>
            <option value="Burkina Faso">Burkina Faso</option>
            <option value="Burundi">Burundi</option>
            <option value="Cabo Verde">Cabo Verde</option>
            <option value="Cameroon">Cameroon</option>
            <option value="Central African Republic">Central African Republic</option>
            <option value="Chad">Chad</option>
            <option value="Comoros">Comoros</option>
            <option value="Congo, Democratic Republic of the">Congo, Dem. Rep.</option>
            <option value="Congo, Republic of the">Congo, Republic</option>
            <option value="Côte d'Ivoire">Côte d'Ivoire</option>
            <option value="Djibouti">Djibouti</option>
            <option value="Egypt">Egypt</option>
            <option value="Equatorial Guinea">Equatorial Guinea</option>
            <option value="Eritrea">Eritrea</option>
            <option value="Eswatini">Eswatini</option>
            <option value="Ethiopia">Ethiopia</option>
            <option value="Gabon">Gabon</option>
            <option value="Gambia">Gambia</option>
            <option value="Ghana">Ghana</option>
            <option value="Guinea">Guinea</option>
            <option value="Guinea-Bissau">Guinea-Bissau</option>
            <option value="Kenya">Kenya</option>
            <option value="Lesotho">Lesotho</option>
            <option value="Liberia">Liberia</option>
            <option value="Libya">Libya</option>
            <option value="Madagascar">Madagascar</option>
            <option value="Malawi">Malawi</option>
            <option value="Mali">Mali</option>
            <option value="Mauritania">Mauritania</option>
            <option value="Mauritius">Mauritius</option>
            <option value="Morocco">Morocco</option>
            <option value="Mozambique">Mozambique</option>
            <option value="Namibia">Namibia</option>
            <option value="Niger">Niger</option>
            <option value="Nigeria">Nigeria</option>
            <option value="Rwanda">Rwanda</option>
            <option value="Sao Tome and Principe">Sao Tome and Principe</option>
            <option value="Senegal">Senegal</option>
            <option value="Seychelles">Seychelles</option>
            <option value="Sierra Leone">Sierra Leone</option>
            <option value="Somalia">Somalia</option>
            <option value="South Africa">South Africa</option>
            <option value="South Sudan">South Sudan</option>
            <option value="Sudan">Sudan</option>
            <option value="Tanzania">Tanzania</option>
            <option value="Togo">Togo</option>
            <option value="Tunisia">Tunisia</option>
            <option value="Uganda">Uganda</option>
            <option value="Zambia">Zambia</option>
            <option value="Zimbabwe">Zimbabwe</option>
          </select>
          <span class="error-text"
                *ngIf="branchForm.get('country')?.invalid && branchForm.get('country')?.touched">
            Please select a country
          </span>
        </div>

        <app-input
          label="Established Date"
          type="date"
          formControlName="establishedDate"
          [required]="true"
          hint="Date the branch was established"
          [error]="getFieldError('establishedDate')">
        </app-input>
      </div>
    </app-form-section>

    <!-- ── 3. ADDRESS ── -->
    <app-form-section [number]="3" title="Address" iconName="home"
                      desc="Physical and postal address for the branch">
      <div class="fields-grid cols-2">
        <app-input
          label="Physical Address"
          type="text"
          placeholder="Street, plot number and landmarks"
          formControlName="address"
          [required]="true"
          [uppercase]="true"
          hint="Full physical address used for deliveries and official visits"
          [error]="getFieldError('address')">
        </app-input>

        <app-input
          label="P.O. Box"
          type="text"
          placeholder="e.g., P.O. Box 456, Kasese"
          formControlName="poBox"
          [required]="true"
          hint="Postal address for official correspondence"
          [error]="getFieldError('poBox')">
        </app-input>
      </div>
    </app-form-section>

    <!-- ── 4. BRANCH MANAGER ── -->
    <app-form-section [number]="4" title="Branch Manager" iconName="user"
                      desc="Primary contact for all branch operations">
      <div class="fields-grid cols-3">
        <app-input
          label="Full Name"
          type="text"
          placeholder="Manager's full legal name"
          formControlName="managerName"
          [required]="true"
          [uppercase]="true"
          hint="As it appears on official records"
          [error]="getFieldError('managerName')">
        </app-input>

        <app-input
          label="Email Address"
          type="email"
          placeholder="manager@example.com"
          formControlName="managerEmail"
          [required]="true"
          hint="Active email used for branch communications"
          [error]="getFieldError('managerEmail')">
        </app-input>

        <app-input
          label="Phone Number"
          type="tel"
          placeholder="+256 712 345 678"
          formControlName="managerPhone"
          [required]="true"
          hint="Include country code (e.g., +256712345678)"
          [error]="getFieldError('managerPhone')">
        </app-input>
      </div>

      <!-- API error shown at bottom of last section -->
      <app-alert variant="error" *ngIf="errorMessage" class="mt-16">
        <p>{{ errorMessage }}</p>
      </app-alert>
    </app-form-section>

  </app-form-shell>

  <div class="form-actions">
    <button type="button" class="btn-secondary" routerLink="/cooperative/branches/dashboard">
      Cancel
    </button>
    <app-button
      variant="primary"
      size="lg"
      (clicked)="openConfirmModal()"
      [loading]="isLoading"
      loadingText="Registering…">
      Register Branch
    </app-button>
  </div>

</form>

<!-- Confirmation modal -->
<app-modal
  [isOpen]="showConfirmModal"
  title="Confirm Branch Registration"
  subtitle="Please review before proceeding"
  variant="warning"
  (closed)="closeConfirmModal()">
  <p>
    You are about to register <strong>{{ formValue.branchName }}</strong> and assign
    <strong>{{ formValue.managerName }}</strong> as branch manager.
  </p>
  <p><strong>Continue?</strong></p>
  <div class="modal-actions" footer>
    <button type="button" class="btn-secondary" (click)="closeConfirmModal()" [disabled]="isLoading">
      Cancel
    </button>
    <app-button
      variant="primary"
      size="md"
      (clicked)="registerBranch()"
      [loading]="isLoading"
      loadingText="Registering…">
      Yes, Register Branch
    </app-button>
  </div>
</app-modal>
