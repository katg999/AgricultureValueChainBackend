<!--
  Agent Form (Register / Edit) — numbered-section layout via app-form-shell + app-form-section.

  Sections:
    1. Agent Details  — full name, national ID, phone, email
    2. Assignment     — role, branch
-->

<form [formGroup]="agentForm" (ngSubmit)="saveAgent()">

  <app-form-shell
    [title]="isEditMode ? 'Edit Agent' : 'Register Agent'"
    [subtitle]="isEditMode ? 'Update the details below and save.' : 'Fill in both sections below, then register the agent.'">

    <!-- ── 1. AGENT DETAILS ── -->
    <app-form-section [number]="1" title="Agent Details" iconName="user"
                      desc="Identity and contact information">

      <div class="fields-grid cols-4">
        <app-input
          label="Full Name"
          placeholder="e.g. Moses Byaruhanga"
          type="text"
          [required]="true"
          [error]="getFieldError('fullName')"
          formControlName="fullName">
        </app-input>

        <app-input
          label="National ID (NIN)"
          placeholder="e.g. CM900421003XKE"
          type="text"
          [required]="true"
          [uppercase]="true"
          hint="14 alphanumeric characters"
          [error]="getFieldError('nationalId')"
          formControlName="nationalId">
        </app-input>

        <app-input
          label="Phone Number"
          placeholder="+256712345678"
          type="tel"
          [required]="true"
          hint="Include country code"
          [error]="getFieldError('phone')"
          formControlName="phone">
        </app-input>

        <app-input
          label="Email Address"
          placeholder="e.g. moses@cooperative.ug"
          type="email"
          [required]="true"
          [error]="getFieldError('email')"
          formControlName="email">
        </app-input>
      </div>
    </app-form-section>

    <!-- ── 2. ASSIGNMENT ── -->
    <app-form-section [number]="2" title="Assignment" iconName="briefcase"
                      desc="Role and the branch this agent works under">

      <div class="fields-grid cols-2">
        <div class="field-group">
          <label class="field-label">Agent Role <span class="required-mark">*</span></label>
          <select title="select agent role" class="form-select" formControlName="role">
            <option value="field_agent">Field Agent</option>
            <option value="collection_clerk">Collection Clerk</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">Branch <span class="required-mark">*</span></label>
          <select
            title="select branch"
            class="form-select"
            formControlName="branchId"
            [class.input-error]="getFieldError('branchId')">
            <option value="" disabled>Select a branch…</option>
            <option *ngFor="let branch of branches" [value]="branch.id">{{ branch.name }}</option>
          </select>
          <p class="field-error" *ngIf="getFieldError('branchId')">
            {{ getFieldError('branchId') }}
          </p>
        </div>
      </div>
    </app-form-section>

  </app-form-shell>

  <div class="form-actions">
    <button type="button" class="btn-secondary" (click)="cancel()">
      Cancel
    </button>
    <app-button
      variant="primary"
      size="lg"
      type="submit"
      [disabled]="isSaving">
      {{ isSaving ? 'Saving…' : (isEditMode ? 'Save Changes' : 'Register Agent') }}
    </app-button>
  </div>

</form>
