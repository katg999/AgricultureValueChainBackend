<!-- features/branch/dashboard/dashboard.component.html -->

<div class="branch-dashboard">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <div class="dashboard-header">
    <div>
    </div>
    <div class="header-actions">
      <button class="btn-secondary" [routerLink]="['/branch/collections']">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1"/>
        </svg>
        View all collections
      </button>
      <!-- <button class="btn-primary" [routerLink]="['/branch/collections/farmer-deliveries/create']">
        + Record Delivery
      </button> -->
    </div>
  </div>

  <!-- ── Stats Grid ─────────────────────────────────────────────────────── -->
  <div class="stats-grid">
    <app-stat-card
      *ngFor="let stat of stats; let i = index"
      [data]="stat"
      [delay]="i * 80">
    </app-stat-card>
  </div>

  <!-- ── Content Row ────────────────────────────────────────────────────── -->
  <div class="content-grid">

    <!-- LEFT: Today's deliveries table -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Today's Deliveries</h2>
        <a class="btn-link" [routerLink]="['/branch/collections']">View all →</a>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>REF</th>
              <th>FARMER</th>
              <th>WEIGHT</th>
              <th>GRADE</th>
              <th>AMOUNT</th>
              <th>TIME</th>
              <th>STATUS</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let d of deliveries">
              <td class="mono">{{ d.ref }}</td>
              <td class="fw-600">{{ d.farmer }}</td>
              <td>{{ d.weight }}</td>
              <td>
                <span class="grade-pill" *ngIf="d.grade !== '—'">{{ d.grade }}</span>
                <span class="muted" *ngIf="d.grade === '—'">—</span>
              </td>
              <td class="mono">{{ d.amount }}</td>
              <td class="muted">{{ d.time }}</td>
              <td>
                <span class="status-pill" [ngClass]="statusClass(d.status)">
                  {{ statusLabel(d.status) }}
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- RIGHT: Activity feed + Quick actions -->
    <div class="right-column">

      <!-- Quick Actions -->
      <div class="card quick-actions-card">
        <div class="card-header">
          <h2 class="card-title">Quick Actions</h2>
        </div>
        <div class="actions-grid">
          <button class="action-tile" [routerLink]="['/branch/collections/farmer-deliveries/create']">
            <span class="action-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
                <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
              </svg>
            </span>
            <span>Record Delivery</span>
          </button>
          <button class="action-tile" [routerLink]="['/branch/farmers/register']">
            <span class="action-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="8.5" cy="7" r="4"/>
                <line x1="20" y1="8" x2="20" y2="14"/>
                <line x1="23" y1="11" x2="17" y2="11"/>
              </svg>
            </span>
            <span>Register Farmer</span>
          </button>
          <button class="action-tile" [routerLink]="['/cooperative/configuration']">
            <span class="action-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </span>
            <span>Grade Rules</span>
          </button>
          <button class="action-tile" [routerLink]="['/branch/inventory/current-stock']">
            <span class="action-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                <line x1="12" y1="22.08" x2="12" y2="12"/>
              </svg>
            </span>
            <span>Check Stock</span>
          </button>
        </div>
      </div>

      <!-- Activity Feed -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Today's Activity</h2>
        </div>
        <div class="activity-list">
          <app-activity-item
            *ngFor="let activity of recentActivities"
            [data]="activity">
          </app-activity-item>
        </div>
      </div>

    </div>

  </div>

</div>
