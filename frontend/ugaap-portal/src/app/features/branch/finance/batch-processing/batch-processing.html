<!-- batch-processing.html
     The main batch list page — three main zones:
       1. Page header with the "Create Batch" button
       2. Status filter tabs (All / Draft / Pending / etc.)
       3. Search input
       4. The table with a kebab action menu per row
-->

<!-- (click)="closeActionMenu()" on the outer container means:
     clicking ANYWHERE on the page that isn't a menu/button closes the open kebab menu. -->
<div class="batch-page" (click)="closeActionMenu()">

  <!-- ── 1. Page header ──────────────────────────────────────────────────── -->
  <div class="page-header">
    <div class="header-content-wrapper">
      <div>
        <p>Manage and track farmer payment batches across seasons.</p>
      </div>
      <!-- (click)="goToCreateBatch()" navigates to /branch/finance/batch-create -->
      <button class="btn primary-action-btn" (click)="goToCreateBatch()">
        <span class="icon-plus">+</span> Create Batch
      </button>
    </div>
  </div>

  <!-- ── 2. Status filter tabs ──────────────────────────────────────────── -->
  <!-- statusTabs is an array defined in the .ts file — looping over it keeps the HTML DRY.
       [class.active] = dynamically adds the 'active' CSS class when selectedStatus matches.
       When 'All' is clicked, selectedStatus = '' which means no status filter. -->
  <div class="status-tabs">
    @for (tab of statusTabs; track tab.value) {
      <button
        type="button"
        class="status-tab"
        [class.active]="selectedStatus === tab.value"
        (click)="setStatusFilter(tab.value)">
        {{ tab.label }}
      </button>
    }
  </div>

  <!-- ── 3. Search input ─────────────────────────────────────────────────── -->
  <div class="filters-bar">
    <div class="search-input">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (input)="applyFilter()"
        placeholder="Search by batch name, ID, season or commodity…"
      />
    </div>
  </div>

  <!-- ── 4. Batch table ──────────────────────────────────────────────────── -->
  <ng-container *ngIf="filteredBatches$ | async as batches">
    <app-data-table
      [columns]="batchCols"
      [rows]="batches"
      [paginate]="true"
      emptyIcon="finance"
      [emptyTitle]="(totalBatchCount$ | async) === 0 ? 'No payment batches yet' : 'No batches match'"
      [emptyMessage]="(totalBatchCount$ | async) === 0 ? 'Create your first batch to start grouping farmer payments for disbursement.' : 'No batches match the selected filters. Try adjusting the status or search term.'"
      emptyActionLabel="Create Batch"
      emptyRoute="/branch/finance/batch-create">

      <ng-template appCell="totalAmount" let-row>
        {{ formatCurrency($any(row).totalAmount) }}
      </ng-template>

      <ng-template appCell="status" let-row>
        <span class="status-badge" [ngClass]="statusClass($any(row).status)">
          {{ $any(row).status }}
        </span>
      </ng-template>

      <ng-template appCell="actions" let-row>
        <div class="action-menu" (click)="$event.stopPropagation()">
          <button
            type="button"
            class="kebab-btn"
            title="Batch actions"
            aria-label="Batch actions"
            [attr.aria-expanded]="openActionMenuId === $any(row).id"
            (click)="toggleActionMenu($any(row).id, $event)">
            <span></span><span></span><span></span>
          </button>
          @if (openActionMenuId === $any(row).id) {
            <div
              class="menu-panel"
              [style.top]="menuPosition.top !== undefined ? menuPosition.top + 'px' : 'auto'"
              [style.bottom]="menuPosition.bottom !== undefined ? menuPosition.bottom + 'px' : 'auto'"
              [style.right.px]="menuPosition.right">
              <button type="button" (click)="viewFarmers($any(row))">View Farmers</button>
              <button type="button" [disabled]="$any(row).status !== 'Draft'" (click)="submitForApproval($any(row))">Submit for Approval</button>
              <button type="button" class="danger" [disabled]="$any(row).status !== 'Draft'" (click)="deleteBatch($any(row))">Delete</button>
            </div>
          }
        </div>
      </ng-template>

    </app-data-table>
  </ng-container>

</div>
