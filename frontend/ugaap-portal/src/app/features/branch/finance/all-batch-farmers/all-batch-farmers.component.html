<!-- all-batch-farmers.component.html
     Shows every farmer in the system — across all batches — in a searchable table.
     Two sections:
       1. Page header with a back button
       2. Search input
       3. Farmer table
-->

<div class="farmers-page">

  <!-- ── 1. Page header ──────────────────────────────────────────────────── -->
  <div class="page-header">
    <div class="header-content-wrapper">
      <div>
        <!-- (click)="goBack()" calls router.navigate(['/branch/finance/batch-processing']) -->
        <button class="back-btn" type="button" (click)="goBack()">← Back to Batches</button>
        <p>Every farmer registered across all payment batches.</p>
      </div>
    </div>
  </div>

  <!-- ── 2. Search input ─────────────────────────────────────────────────── -->
  <div class="filters-bar">
    <div class="search-input">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (input)="applySearch()"
        placeholder="Search by farmer ID, name, commodity or branch…"
      />
    </div>
  </div>

  <!-- ── 3. Farmer table ─────────────────────────────────────────────────── -->
  <ng-container *ngIf="filteredFarmers$ | async as farmers">
    <app-data-table
      [columns]="cols"
      [rows]="farmers"
      [paginate]="true"
      emptyIcon="farmer"
      emptyTitle="No farmers found"
      emptyMessage="No farmers match your search. Try a different name, ID, or branch.">

      <ng-template appCell="netPayable" let-row>
        {{ formatCurrency($any(row).netPayable) }}
      </ng-template>

    </app-data-table>
  </ng-container>

</div>
