<!-- async pipe subscribes to the observable and auto-unsubscribes when the component is destroyed.
     "as filteredDeliveries" gives us a local template variable to pass into getter methods. -->
<div class="delivery-page" (click)="closeActionMenu()" *ngIf="filteredDeliveries$ | async as filteredDeliveries">

  <!-- =========================================================
       PAGE HEADER
       ========================================================= -->
  <div class="page-header">

  <div class="header-content-wrapper">
    <div>
      <p>
        Review and approve commodity deliveries submitted by branches.
      </p>
    </div>

    <div class="header-actions">
      <button class="btn primary-action-btn" (click)="addFarmerDelivery()">
        <span class="icon-plus">+</span> Add Farmer Delivery
      </button>
    </div>
  </div>

</div>

  <!-- =========================================================
       FILTER SECTION
       applyFilter() is triggered whenever values change
       ========================================================= -->
  <div class="filter-card">
    <div class="filter-group">
      <label>Search</label>
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (input)="applyFilter()"
        placeholder="Search by branch, commodity, status, season, session or ID..."
      />
    </div>
  </div>

  <!-- DELIVERY TABLE -->
  <app-data-table
      [columns]="deliveryCols"
      [rows]="filteredDeliveries"
      [paginate]="true"
      emptyIcon="truck"
      emptyTitle="No deliveries yet"
      emptyMessage="Record the first farmer delivery to get started."
      emptyActionLabel="Add Delivery"
      emptyRoute="/branch/collections/deliveries/add">

      <ng-template appCell="id" let-row>
        <span class="mono">{{ $any(row).id }}</span>
      </ng-template>

      <ng-template appCell="branchName" let-row>
        <span class="cell-branch" [title]="$any(row).branchName">{{ $any(row).branchName }}</span>
      </ng-template>

      <ng-template appCell="season" let-row>
        <span class="season-badge" [ngClass]="seasonClass($any(row).season)">{{ $any(row).season }}</span>
      </ng-template>

      <ng-template appCell="volume" let-row>
        {{ $any(row).volume | number }} {{ $any(row).volumeUnit || 'KG' }}
      </ng-template>

      <ng-template appCell="estimatedValue" let-row>
        UGX {{ formatUGX($any(row).estimatedValue) }}
      </ng-template>

      <ng-template appCell="status" let-row>
        <span class="status-badge" [ngClass]="statusClass($any(row).status)">{{ $any(row).status }}</span>
      </ng-template>

      <ng-template appCell="actions" let-row>
        <div class="action-menu" (click)="$event.stopPropagation()">
          <button
            type="button"
            class="kebab-btn"
            title="Delivery actions"
            aria-label="Delivery actions"
            [attr.aria-expanded]="openActionMenuId === $any(row).id"
            (click)="toggleActionMenu($any(row).id, $event)">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="menu-panel" *ngIf="openActionMenuId === $any(row).id"
            [style.top]="menuPosition.top !== undefined ? menuPosition.top + 'px' : 'auto'"
            [style.bottom]="menuPosition.bottom !== undefined ? menuPosition.bottom + 'px' : 'auto'"
            [style.right.px]="menuPosition.right">
            <button type="button" (click)="viewDelivery($any(row))">View</button>
            <button type="button" (click)="editDelivery($any(row))">Edit</button>
          </div>
        </div>
      </ng-template>

    </app-data-table>


</div>
