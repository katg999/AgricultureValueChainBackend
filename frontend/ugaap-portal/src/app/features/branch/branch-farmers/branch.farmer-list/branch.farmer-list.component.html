<div class="page-shell" *ngIf="farmers$ | async as farmers">
  <div class="top-header">
    <div class="header-content">
      <p class="subtitle">Branch farmer records</p>
    </div>

    <div class="header-actions">
      <app-button type="button" size="md" variant="primary" iconLeft="+" (clicked)="onAddFarmer()">
        Register farmer
      </app-button>
    </div>
  </div>

  <div class="summary-cards-grid">
    <app-stat-card
      [data]="{
        label: 'Registered Farmers',
        value: farmers.length,
        icon: 'farmer',
        trend: '+8.5%',
        trendUp: true,
      }"
    >
    </app-stat-card>

    <app-stat-card
      [data]="{
        label: 'Portfolio At Risk',
        value: 'UGX ' + portfolioAtRisk(farmers),
        icon: 'wallet',
        trend: '-5.2%',
        trendUp: false,
        status: 'warning',
      }"
    >
    </app-stat-card>

    <app-stat-card
      [data]="{
        label: 'Collection Progress',
        value: collectionProgress + '%',
        icon: 'chart',
      }"
    >
    </app-stat-card>
  </div>

  <div class="filters-bar">
    <div class="search-input">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        type="text"
        placeholder="Search farmers by name, ID, branch, commodity, status or stage…"
        [(ngModel)]="searchQuery"
        (ngModelChange)="applyFilter()"
      />
    </div>
  </div>

  <div *ngIf="filteredFarmers$ | async as filteredFarmers">

    <app-data-table
      [columns]="cols"
      [rows]="filteredFarmers"
      [paginate]="true"
      emptyIcon="farmer"
      emptyTitle="No farmers yet"
      emptyMessage="Register the first farmer for this branch to get started."
      emptyActionLabel="Register Farmer"
      emptyRoute="/branch/farmers/register">

      <ng-template appCell="primaryCommodity" let-row>
        <span class="commodity-tag">{{ $any(row).primaryCommodity }}</span>
      </ng-template>

      <ng-template appCell="balance" let-row>
        <span
          class="text-bold"
          [ngClass]="{ 'text-danger-custom': $any(row).balance !== '0.00' && $any(row).balance !== '--' }">
          {{ $any(row).balance }}
        </span>
      </ng-template>

      <ng-template appCell="status" let-row>
        <span class="status-badge" [ngClass]="$any(row).status.toLowerCase()">
          {{ $any(row).status }}
        </span>
      </ng-template>

      <ng-template appCell="actions" let-row>
        <div class="kebab-wrapper">
          <button
            class="kebab-btn"
            type="button"
            title="More options"
            (click)="toggleKebab($any(row).id, $event)">
            &#8942;
          </button>
          <div class="kebab-dropdown" *ngIf="openKebabId === $any(row).id">
            <button class="kebab-item" type="button" (click)="onEditFarmer($any(row))">
              Edit details
            </button>
            <button class="kebab-item" type="button" (click)="onViewProfile($any(row))">
              View profile
            </button>
            <button class="kebab-item" type="button" (click)="onViewAllocations($any(row))">
              View allocations
            </button>
          </div>
        </div>
      </ng-template>

    </app-data-table>


  </div>
</div>
