<div class="auth-page">
    <div class="auth-card">
  
      <div class="logo-row">
        <div class="logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24"
            fill="white">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10
              10 10 10-4.48 10-10S17.52 2 12 2zm-1
              14H9V8h2v8zm4 0h-2V8h2v8z"/>
          </svg>
        </div>
        <span class="logo-name">UGAAP</span>
      </div>
  
      <h1 class="card-title">Verify your identity</h1>
      <p class="card-subtitle">
        A 4-digit code has been sent to verify your
        identity before you can login
      </p>
  
      <div class="error-strip" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
  
      <!-- Visual boxes — clicking any of them focuses the hidden input -->
      <div class="otp-inputs" (click)="focusHidden()">
        <div
          *ngFor="let box of boxes; let i = index"
          class="otp-box"
          [class.filled]="box !== ''"
          [class.active]="i === activeIndex && !isComplete">
          {{ box }}
          <span
            class="cursor"
            *ngIf="i === activeIndex && !isComplete">
          </span>
        </div>
      </div>
  
      <!-- Hidden real input that captures keystrokes -->
      <input
        #hiddenInput
        class="hidden-input"
        type="text"
        inputmode="numeric"
        autocomplete="one-time-code"
        [value]="otpValue"
        (input)="onHiddenInput($event)"
        (keydown)="onHiddenKeyDown($event)"/>
  
      <button
        class="btn-primary"
        [disabled]="!isComplete || isLoading"
        (click)="verify()">
        <span class="spinner" *ngIf="isLoading"></span>
        <span>{{ isLoading ? 'Verifying...' : 'Verify Code' }}</span>
      </button>
  
      <div class="resend-row">
        <span>Didn't receive the code?</span>
        <button
          type="button"
          class="resend-btn"
          [disabled]="resendCooldown > 0"
          (click)="resendOtp()">
          <span *ngIf="resendCooldown === 0">Resend</span>
          <span *ngIf="resendCooldown > 0">
            Resend in {{ resendCooldown }}s
          </span>
        </button>
      </div>
  
      <div class="back-row">
        <a routerLink="/auth/login">← Back to Login</a>
      </div>
  
    </div>
  
    <div class="footer-info">
      <div class="footer-item">
        <svg width="14" height="14" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8
            3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>SECURE CHANNEL</span>
      </div>
      <div class="footer-item">
        <svg width="14" height="14" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>{{ formattedTime }} REMAINING</span>
      </div>
    </div>
  
  </div>
