<div class="auth-page">
    <div class="auth-card">
  
      <!-- Logo -->
      <div class="logo-row">
        <div class="logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24"
            fill="white">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10
              10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4
              0h-2V8h2v8z"/>
          </svg>
        </div>
        <span class="logo-name">UGAAP</span>
      </div>
  
      <h1 class="card-title">Your session has expired</h1>
      <p class="card-subtitle">
        For your security, we've logged you out after
        <strong>{{ inactivityTime }}</strong> minutes of
        inactivity to protect your account data.
      </p>
  
      <a routerLink="/auth/login" class="btn-primary">
        Sign in Again
      </a>
  
      <p class="notice">
        Any unsaved progress in Operations or Inventory
        forms may have been lost. Please verify your last
        shipment entries upon re-entry.
      </p>
  
    </div>
  </div>
