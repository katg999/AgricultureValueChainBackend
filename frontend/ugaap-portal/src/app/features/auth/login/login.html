<div class="auth-page">

    <!-- Main card -->
    <div class="auth-card">
  
      <!-- Logo -->
      <div class="logo-row">
        <div class="logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
              10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4
              0h-2V8h2v8z"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">UGAAP</span>
          <span class="logo-sub">Uganda Agrarian Portal</span>
        </div>
      </div>
  
      <!-- Error -->
      <div class="error-strip" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
  
      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  
        <div class="form-field">
          <label>Email address</label>
          <input
            type="email"
            formControlName="email"
            placeholder="e.g. namubiru@ugaap.ug"
            [class.input-error]="emailControl?.invalid && emailControl?.touched"/>
          <span class="field-error"
            *ngIf="emailControl?.invalid && emailControl?.touched">
            <span *ngIf="emailControl?.errors?.['required']">
              Email is required
            </span>
            <span *ngIf="emailControl?.errors?.['email']">
              Enter a valid email address
            </span>
          </span>
        </div>
  
        <div class="form-field">
          <div class="label-row">
            <label>Password</label>
            <a routerLink="/auth/forgot-password" class="forgot-link">
              Forgot password?
            </a>
          </div>
          <div class="input-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              [class.input-error]="passwordControl?.invalid && passwordControl?.touched"/>
            <button
              type="button"
              class="eye-toggle"
              (click)="togglePassword()">
              <svg *ngIf="!showPassword" width="18" height="18"
                viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4
                  8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" width="18" height="18"
                viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1
                  12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1
                  5.06-5.94M9.9 4.24A9.12 9.12 0 0 1
                  12 4c7 0 11 8 11 8a18.5 18.5 0 0 1
                  -2.16 3.19m-6.72-1.07a3 3 0 1
                  1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error"
            *ngIf="passwordControl?.invalid && passwordControl?.touched">
            Password is required
          </span>
        </div>
  
        <button
          type="submit"
          class="btn-primary"
          [disabled]="isLoading">
          <span class="spinner" *ngIf="isLoading"></span>
          <span>{{ isLoading ? 'Signing in...' : 'Sign in' }}</span>
        </button>
  
      </form>
  
      <!-- USSD hint inside card at bottom -->
      <div class="ussd-hint">
        FARMERS CHECK BALANCES VIA <strong>*XXX#</strong>
      </div>
  
    </div>
  
    <!-- Market feed cards at bottom background -->
    <div class="market-cards">
      <div class="market-card market-card-left">
        <div class="market-label">MARKET FEED</div>
        <div class="market-value">+1.2% Maize</div>
      </div>
      <div class="market-card market-card-right">
      </div>
    </div>
  
  </div>
