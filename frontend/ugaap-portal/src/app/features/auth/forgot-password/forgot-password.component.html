<!-- 
  Forgot Password Page
  
  First step in password recovery
  Uses reusable components: Logo, Alert, Input, Button
-->

<div class="auth-page">
  <div class="auth-card">

    <!-- UGAAP Logo (Reusable Component) -->
    <app-logo size="md" [showSubtitle]="false"></app-logo>

    <!-- Page Title and Subtitle -->
    <h1 class="card-title">Forgot your password?</h1>
    <p class="card-subtitle">
      Enter your registered email address or phone number and we'll send you a code to reset your account.
    </p>

    <!-- Error Alert (Reusable Component) -->
    <app-alert 
      variant="error" 
      [message]="errorMessage"
      *ngIf="errorMessage">
    </app-alert>

    <!-- Forgot Password Form -->
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">

      <!-- Email/Phone Input (Reusable Component) -->
      <div class="form-field">
        <app-input
          label="Email address or phone"
          type="text"
          placeholder="e.g. namubiru@ugaap.ug or +256 700 000 000"
          formControlName="emailOrPhone"
          [required]="true"
          [error]="getEmailOrPhoneError()">
        </app-input>
      </div>

      <!-- Submit Button (Reusable Component) -->
      <app-button
        type="submit"
        variant="primary"
        size="lg"
        [fullWidth]="true"
        [loading]="isLoading"
        loadingText="Sending...">
        Send Verification Code
      </app-button>

    </form>

    <!-- Back to Login Link -->
    <div class="back-row">
      <a routerLink="/auth/login">← Back to Login</a>
    </div>

  </div>
</div>
