<div class="auth-page">
    <div class="auth-card">
  
      <div class="logo-row">
        <div class="logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24"
            fill="white">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10
              10 10 10-4.48 10-10S17.52 2 12 2zm-1
              14H9V8h2v8zm4 0h-2V8h2v8z"/>
          </svg>
        </div>
        <span class="logo-name">UGAAP</span>
      </div>
  
      <h1 class="card-title">Forgot your password?</h1>
      <p class="card-subtitle">
        Enter your registered email address or phone
        number and we'll send you a code to reset
        your account.
      </p>
  
      <div class="error-strip" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
  
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
  
        <div class="form-field">
          <label>Email address</label>
          <input
            type="text"
            formControlName="emailOrPhone"
            placeholder="e.g. namubiru@ugaap.ug"
            [class.input-error]="emailOrPhoneControl?.invalid
              && emailOrPhoneControl?.touched"/>
          <span class="field-error"
            *ngIf="emailOrPhoneControl?.invalid
              && emailOrPhoneControl?.touched">
            This field is required
          </span>
        </div>
  
        <button
          type="submit"
          class="btn-primary"
          [disabled]="isLoading">
          <span class="spinner" *ngIf="isLoading"></span>
          <span>
            {{ isLoading ? 'Sending...' : 'Send Verification Code' }}
          </span>
        </button>
  
      </form>
  
      <div class="resend-row">
        <span>Didn't receive the code?</span>
        <button type="button" class="resend-btn">
          Resend
        </button>
      </div>
  
      <div class="back-row">
        <a routerLink="/auth/login">← Back to Login</a>
      </div>
  
    </div>
  </div>
