<!-- 
  Maker & Checker Account Creation Page
  
  Creates both Maker and Checker accounts after cooperative activation
-->

<div class="page">
  <div class="page-container">
    
    <!-- Page Header -->
    <div class="page-header">
      <app-logo size="sm" [showSubtitle]="false"></app-logo>
      <h1 class="page-title">Create Maker & Checker Accounts</h1>
      <p class="page-subtitle">Set up admin accounts for {{ cooperativeName }}</p>
    </div>

    <!-- Info Alert -->
    <app-alert variant="info">
      <p><strong>ℹ️ Important:</strong> Both Maker and Checker will have full permissions to manage all cooperative operations. These are the primary admin accounts.</p>
    </app-alert>

    <div class="dual-form-container">

      <!-- MAKER ACCOUNT -->
      <form [formGroup]="makerForm" class="account-form">
        
        <app-info-card title="MAKER ACCOUNT" icon="👤">
          
          <!-- Photo Upload -->
          <div class="photo-upload-section">
            <label class="photo-label">Profile Photo <span class="optional-tag">OPTIONAL</span></label>
            
            <div class="photo-upload-container">
              <!-- Photo Preview -->
              <div class="photo-preview" *ngIf="makerPhotoPreview">
                <img [src]="makerPhotoPreview" alt="Maker photo">
                <button 
                  type="button" 
                  class="photo-remove"
                  (click)="removeMakerPhoto()">
                  ✕
                </button>
              </div>

              <!-- Upload Button -->
              <div class="photo-upload-btn" *ngIf="!makerPhotoPreview">
                <input 
                  type="file" 
                  id="makerPhoto" 
                  accept="image/*"
                  (change)="onMakerPhotoSelect($event)"
                  hidden>
                <label for="makerPhoto" class="upload-label">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                  <span>Upload Photo</span>
                </label>
                <p class="upload-hint">JPG, PNG up to 5MB</p>
              </div>
            </div>
          </div>

          <!-- Full Name -->
          <app-input
            label="Full name"
            type="text"
            placeholder="e.g. John Okello"
            formControlName="fullName"
            [required]="true"
            hint="Full legal name of the Maker"
            [error]="getFieldError(makerForm, 'fullName')">
          </app-input>

          <!-- Email & Phone -->
          <div class="form-row-2col">
            <app-input
              label="Email address"
              type="email"
              placeholder="john.o@coop.ug"
              formControlName="email"
              [required]="true"
              hint="Used for login and notifications"
              [error]="getFieldError(makerForm, 'email')">
            </app-input>

            <app-input
              label="Phone number"
              type="tel"
              placeholder="+256 700 000000"
              formControlName="phone"
              [required]="true"
              hint="For OTP verification"
              [error]="getFieldError(makerForm, 'phone')">
            </app-input>
          </div>

          <!-- Date of Birth & National ID -->
          <div class="form-row-2col">
            <app-input
              label="Date of birth"
              type="date"
              placeholder="YYYY-MM-DD"
              formControlName="dateOfBirth"
              hint="Format: YYYY-MM-DD">
            </app-input>

            <app-input
              label="National ID number"
              type="text"
              placeholder="CF9200000XXX"
              formControlName="nationalId">
            </app-input>
          </div>

          <!-- Gender -->
          <div class="form-field">
            <label class="form-label">Gender</label>
            <select class="form-select" formControlName="gender">
              <option *ngFor="let gender of genderOptions" [value]="gender">
                {{ gender }}
              </option>
            </select>
          </div>

          <!-- Password & Confirm -->
          <div class="form-row-2col">
            <app-input
              label="Password"
              type="password"
              placeholder="••••••••"
              formControlName="password"
              [required]="true"
              hint="Minimum 8 characters"
              [error]="getFieldError(makerForm, 'password')">
            </app-input>

            <app-input
              label="Confirm password"
              type="password"
              placeholder="••••••••"
              formControlName="confirmPassword"
              [required]="true"
              [error]="getFieldError(makerForm, 'confirmPassword')">
            </app-input>
          </div>

          <!-- Password Strength -->
          <app-password-strength
            [password]="getMakerPassword()"
            [showLabel]="true">
          </app-password-strength>

        </app-info-card>

      </form>

      <!-- CHECKER ACCOUNT -->
      <form [formGroup]="checkerForm" class="account-form">
        
        <app-info-card title="CHECKER ACCOUNT" icon="✓">
          
          <!-- Photo Upload -->
          <div class="photo-upload-section">
            <label class="photo-label">Profile Photo <span class="optional-tag">OPTIONAL</span></label>
            
            <div class="photo-upload-container">
              <!-- Photo Preview -->
              <div class="photo-preview" *ngIf="checkerPhotoPreview">
                <img [src]="checkerPhotoPreview" alt="Checker photo">
                <button 
                  type="button" 
                  class="photo-remove"
                  (click)="removeCheckerPhoto()">
                  ✕
                </button>
              </div>

              <!-- Upload Button -->
              <div class="photo-upload-btn" *ngIf="!checkerPhotoPreview">
                <input 
                  type="file" 
                  id="checkerPhoto" 
                  accept="image/*"
                  (change)="onCheckerPhotoSelect($event)"
                  hidden>
                <label for="checkerPhoto" class="upload-label">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                  <span>Upload Photo</span>
                </label>
                <p class="upload-hint">JPG, PNG up to 5MB</p>
              </div>
            </div>
          </div>

          <!-- Full Name -->
          <app-input
            label="Full name"
            type="text"
            placeholder="e.g. Sarah Namubiru"
            formControlName="fullName"
            [required]="true"
            hint="Full legal name of the Checker"
            [error]="getFieldError(checkerForm, 'fullName')">
          </app-input>

          <!-- Email & Phone -->
          <div class="form-row-2col">
            <app-input
              label="Email address"
              type="email"
              placeholder="sarah.n@coop.ug"
              formControlName="email"
              [required]="true"
              hint="Used for login and notifications"
              [error]="getFieldError(checkerForm, 'email')">
            </app-input>

            <app-input
              label="Phone number"
              type="tel"
              placeholder="+256 700 000000"
              formControlName="phone"
              [required]="true"
              hint="For OTP verification"
              [error]="getFieldError(checkerForm, 'phone')">
            </app-input>
          </div>

          <!-- Date of Birth & National ID -->
          <div class="form-row-2col">
            <app-input
              label="Date of birth"
              type="date"
              placeholder="YYYY-MM-DD"
              formControlName="dateOfBirth"
              hint="Format: YYYY-MM-DD">
            </app-input>

            <app-input
              label="National ID number"
              type="text"
              placeholder="CF9200000XXX"
              formControlName="nationalId">
            </app-input>
          </div>

          <!-- Gender -->
          <div class="form-field">
            <label class="form-label">Gender</label>
            <select class="form-select" formControlName="gender">
              <option *ngFor="let gender of genderOptions" [value]="gender">
                {{ gender }}
              </option>
            </select>
          </div>

          <!-- Password & Confirm -->
          <div class="form-row-2col">
            <app-input
              label="Password"
              type="password"
              placeholder="••••••••"
              formControlName="password"
              [required]="true"
              hint="Minimum 8 characters"
              [error]="getFieldError(checkerForm, 'password')">
            </app-input>

            <app-input
              label="Confirm password"
              type="password"
              placeholder="••••••••"
              formControlName="confirmPassword"
              [required]="true"
              [error]="getFieldError(checkerForm, 'confirmPassword')">
            </app-input>
          </div>

          <!-- Password Strength -->
          <app-password-strength
            [password]="getCheckerPassword()"
            [showLabel]="true">
          </app-password-strength>

        </app-info-card>

      </form>

    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button 
        type="button"
        class="btn-cancel"
        (click)="cancel()">
        Cancel Setup
      </button>

      <app-button
        type="button"
        variant="primary"
        size="lg"
        [loading]="isLoading"
        loadingText="Creating Accounts..."
        (clicked)="createAccounts()">
        Create Both Accounts
      </app-button>
    </div>

  </div>
</div>
