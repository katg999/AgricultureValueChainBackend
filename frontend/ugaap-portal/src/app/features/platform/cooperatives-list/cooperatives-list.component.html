<!-- 
  Cooperatives List Page
  
  Table view of all registered cooperatives
-->

<div class="page">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-actions">
      <!-- Export Report Button -->
      <app-button
        variant="ghost"
        size="md"
        (clicked)="onExportReport()">
        Export report
      </app-button>

      <!-- Add Organisation Button -->
      <app-button
        variant="primary"
        size="md"
        iconLeft="+"
        (clicked)="onAddCooperative()">
        Add organisation
      </app-button>
    </div>
  </div>

  <!-- Filters Bar -->
  <div class="filters-bar">
    <!-- Search Input -->
    <div class="search-input">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        type="text"
        placeholder="Search by name, ID or manager..."
        [(ngModel)]="searchQuery"
        (input)="onSearch()">
    </div>

    <!-- Status Filter -->
    <select title="filter" class="filter-select" [(ngModel)]="selectedStatus" (change)="onStatusChange()">
      <option>All Statuses</option>
      <option>Active</option>
      <option>Pending</option>
      <option>Suspended</option>
    </select>

    <!-- Country Filter -->
    <select title="filter" class="filter-select" [(ngModel)]="selectedCountry" (change)="onCountryChange()">
      <option>All Countries</option>
      <option>Uganda</option>
      <option>Kenya</option>
      <option>Tanzania</option>
    </select>

    <!-- More Filters Button -->
    <button class="more-filters-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      More Filters
    </button>
  </div>

  <!-- Cooperatives Table -->
  <div class="table-card">
    <app-table
      [columns]="columns"
      [data]="filteredCooperatives"
      [loading]="isLoading"
      [hoverable]="true"
      [clickable]="true"
      emptyMessage="No cooperatives found"
      (rowClicked)="onRowClick($event)">
    </app-table>

    <!-- Note: Custom cell rendering would go in table component or use ng-template -->
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <p class="pagination-info">Showing <strong>1 to 4</strong> of <strong>12</strong> organisations</p>
    
    <div class="pagination-controls">
      <button title="Previous" class="pagination-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="pagination-btn active">1</button>
      <button class="pagination-btn">2</button>
      <button class="pagination-btn">3</button>

      <button title="Next" class="pagination-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>
