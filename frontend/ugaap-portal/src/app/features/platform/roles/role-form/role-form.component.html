<form [formGroup]="roleForm" (ngSubmit)="saveRole()">

  <app-form-shell
    [title]="isEditMode ? 'Edit Role' : 'Create Role'"
    subtitle="Define the role's identity and assign permissions.">

    <!-- ── 1. ROLE DETAILS ── -->
    <app-form-section [number]="1" title="Role Details" iconName="shield"
                      desc="Name and describe what this role is for">

      <div class="fields-grid cols-2">
        <app-input
          label="Role name"
          placeholder="e.g. Logistics Manager"
          type="text"
          [required]="true"
          [error]="getFieldError('name')"
          formControlName="name">
        </app-input>

        <div class="input-group">
          <app-input
            label="Tenant ID"
            placeholder="e.g. ugaap-farmers"
            type="text"
            [required]="true"
            [error]="getFieldError('tenantId')"
            formControlName="tenantId">
          </app-input>
          <p class="field-hint">Pre-filled when arriving from onboarding</p>
        </div>
      </div>

      <div class="input-group mt-16">
        <label class="input-label">Description <span class="required-mark">*</span></label>
        <textarea
          class="form-input"
          placeholder="Brief description of what this role can do…"
          formControlName="description"
          [class.input-error]="getFieldError('description')"
          rows="3"></textarea>
        <p class="field-error" *ngIf="getFieldError('description')">
          {{ getFieldError('description') }}
        </p>
      </div>
    </app-form-section>

    <!-- ── 2. PERMISSIONS ── -->
    <app-form-section [number]="2" title="Permissions" iconName="list"
                      [desc]="permissionsDesc">

      <app-permission-tabs scope="platform" [(selected)]="selectedPermissions">
      </app-permission-tabs>

      <div *ngIf="errorMessage" class="save-error" role="alert">{{ errorMessage }}</div>
    </app-form-section>

  </app-form-shell>

  <div class="form-actions">
    <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
    <app-button variant="primary" size="lg" type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Saving…' : (isEditMode ? 'Update role' : 'Create role') }}
    </app-button>
  </div>

</form>
