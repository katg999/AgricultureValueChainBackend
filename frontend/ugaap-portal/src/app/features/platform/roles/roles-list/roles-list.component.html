<!-- 
  Roles List Page
  
  Manage system and custom roles with permissions
-->



<div class="page">
  <div class="page-container">
    
    <!-- Page Header -->
    <div class="page-header">
      <app-button
        variant="primary"
        size="md"
        iconLeft="+"
        (clicked)="RoleForm()">
        Create new role
      </app-button>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <div class="search-input">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          placeholder="Search roles..."
          [(ngModel)]="searchQuery">
      </div>
    </div>

    <!-- Roles Grid - USING REUSABLE COMPONENT -->
    <div class="roles-grid">
      <app-role-card
        *ngFor="let role of filteredRoles"
        [role]="role"
        (cardClicked)="viewRole($event)"
        (editClicked)="editRole($event)"
        (deleteClicked)="deleteRole($event)">
      </app-role-card>
    </div>

    <app-empty-state
      *ngIf="filteredRoles.length === 0"
      icon="shield"
      title="No roles found"
      message="Try adjusting your search, or create a new role."
      actionLabel="Create Role"
      route="/platform/roles/role-form">
    </app-empty-state>

  </div>
</div>
