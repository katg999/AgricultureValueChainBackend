<div class="page">
  <div class="page-container">
    
    <!-- Search + action on the same row -->
    <div class="filters-bar">
      <div class="search-input">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          placeholder="Search roles..."
          [(ngModel)]="searchQuery">
      </div>
      <app-button
        variant="primary"
        size="md"
        iconLeft="+"
        (clicked)="createNewRole()">
        Create new role
      </app-button>
    </div>

    <!-- ── Summary Stats ───────────────────────────────────────────────────── -->
    <div class="stats-grid">
      <app-stat-card
        *ngFor="let s of stats; let i = index"
        [data]="s"
        [delay]="i * 80">
      </app-stat-card>
    </div>

    <!-- ── Search toolbar ─────────────────────────────────────────────────── -->
    <div class="toolbar">
      <div class="search-wrap">
        <app-input
          type="text"
          placeholder="Search roles..."
          [(ngModel)]="searchQuery">
        </app-input>
      </div>
    </div>

    <!-- ── Roles Table ─────────────────────────────────────────────────────── -->
    <app-data-table
      [columns]="cols"
      [rows]="filteredRoles"
      [paginate]="true"
      [clickable]="true"
      emptyIcon="shield"
      emptyTitle="No roles found"
      emptyMessage="Try adjusting your search, or create a new role."
      emptyActionLabel="Create Role"
      emptyRoute="/platform/roles/role-form"
      (rowClick)="viewRole($any($event))">

      <ng-template appCell="name" let-row>
        <div class="role-name-cell">
          <span class="role-name">{{ $any(row).name }}</span>
          <span class="role-desc">{{ $any(row).description }}</span>
        </div>
      </ng-template>

      <ng-template appCell="type" let-row>
        <span class="badge"
              [class.badge-system]="$any(row).isSystem"
              [class.badge-custom]="!$any(row).isSystem">
          {{ $any(row).isSystem ? 'System' : 'Custom' }}
        </span>
      </ng-template>

    <ng-template appCell="actions" let-row>
      <div class="action-buttons" (click)="$event.stopPropagation()">
        <button class="action-btn" title="Edit role" (click)="editRole($any(row))" [disabled]="$any(row).isSystem">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="action-btn action-btn-danger" title="Delete role" (click)="deleteRole($any(row))" [disabled]="$any(row).isSystem">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </ng-template>

    </app-data-table>

  </div>
</div>
