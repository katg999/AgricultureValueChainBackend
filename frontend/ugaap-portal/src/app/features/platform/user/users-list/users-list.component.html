<!-- 
  Users List Page
  
  Table view of all platform and cooperative admin users
-->

<div class="page">
  <div class="page-container">
    
    <!-- Page Header -->
    <div class="page-header">
      <app-button
        variant="primary"
        size="md"
        iconLeft="+"
        (clicked)="addNewUser()">
        Add new user
      </app-button>
    </div>

    <!-- Statistics Cards -->
    <div class="stats-grid">
      <app-stat-card [delay]="0" [data]="{
        label: 'Total Users',
        value: 480,
        icon: 'users',
        trend: '+12%',
        trendUp: true
      }"></app-stat-card>

      <app-stat-card [delay]="80" [data]="{
        label: 'Active Users',
        value: 304,
        icon: 'check',
        trend: '+12%',
        trendUp: true,
        status: 'active'
      }"></app-stat-card>

      <app-stat-card [delay]="160" [data]="{
        label: 'Inactive Users',
        value: 103,
        icon: 'alert',
        trend: '+12%',
        trendUp: false,
        status: 'warning'
      }"></app-stat-card>

      <app-stat-card [delay]="240" [data]="{
        label: 'Locked Accounts',
        value: 3,
        icon: 'alert',
        status: 'critical'
      }"></app-stat-card>
    </div>

    <!-- Filters and Search -->
    <div class="filters-bar">
      
      <!-- Search Input -->
      <div class="search-input">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          placeholder="Search by name, ID or manager..."
          [(ngModel)]="searchQuery"
          (input)="onSearch()">
      </div>

      <!-- Role Filter -->
      <select
        title="filter"
        class="filter-select"
        [(ngModel)]="selectedRole"
        (change)="onRoleFilterChange()">
        <option *ngFor="let role of roleOptions" [value]="role">
          {{ role }}
        </option>
      </select>

      <!-- Cooperation Filter (duplicate for design) -->
      <select
        title="filter" 
        class="filter-select"
        [(ngModel)]="selectedRole"
        (change)="onRoleFilterChange()">
        <option *ngFor="let role of roleOptions" [value]="role">
          {{ role }}
        </option>
      </select>

      <!-- Cooperation Filter -->
      <select 
        title="filter"
        class="filter-select"
        [(ngModel)]="selectedCooperation"
        (change)="onCooperationFilterChange()">
        <option *ngFor="let coop of cooperationOptions" [value]="coop">
          {{ coop }}
        </option>
      </select>

    </div>

    <!-- Users Table -->
    <div class="table-container">
      <app-data-table
        [columns]="userCols"
        [rows]="filteredUsers"
        [paginate]="true"
        [clickable]="true"
        (rowClick)="onRowClicked($any($event))"
        emptyIcon="users"
        emptyTitle="No users found"
        emptyMessage="Add the first user to get started."
        emptyActionLabel="Add User"
        emptyRoute="/platform/users/add-user">

        <ng-template appCell="name" let-row>
          <div class="user-cell">
            <div class="user-avatar">{{ getUserInitials($any(row).name) }}</div>
            <span class="user-name">{{ $any(row).name }}</span>
          </div>
        </ng-template>

        <ng-template appCell="email" let-row>
          <span class="text-muted">{{ $any(row).email }}</span>
        </ng-template>

        <ng-template appCell="phone" let-row>
          <span class="text-muted">{{ $any(row).phone }}</span>
        </ng-template>

        <ng-template appCell="role" let-row>
          <app-badge [variant]="getRoleBadgeVariant($any(row).role)" size="sm">
            {{ $any(row).role }}
          </app-badge>
        </ng-template>

        <ng-template appCell="lastLogin" let-row>
          <span class="text-muted">{{ $any(row).lastLogin }}</span>
        </ng-template>

        <ng-template appCell="actions" let-row>
          <div class="actions-cell">
            <button class="action-btn" (click)="viewUser($any(row), $event)" title="View user">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5C7 5 2.73 8.11 1 12.5 2.73 16.89 7 20 12 20s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5z" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
            <button class="action-btn" (click)="moreActions($any(row), $event)" title="More actions">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="5" r="2" fill="currentColor"/>
                <circle cx="12" cy="12" r="2" fill="currentColor"/>
                <circle cx="12" cy="19" r="2" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </ng-template>

      </app-data-table>

    </div>

  </div>
</div>
