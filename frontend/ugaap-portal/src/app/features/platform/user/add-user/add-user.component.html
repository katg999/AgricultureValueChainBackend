<!--
  Add New User — two-section form using app-form-shell / app-form-section
  to match the visual style of all other platform forms.

  Sections:
    1. Personal Details — name, email, phone, DOB, national ID, gender
    2. Account Access   — role, temporary password, toggles
-->

<form [formGroup]="userForm" (ngSubmit)="saveUser()">

  <app-form-shell title="Add New User"
                  subtitle="Fill in personal details and account access below.">

    <!-- ── 1. PERSONAL DETAILS ── -->
    <app-form-section [number]="1" title="Personal Details" iconName="user"
                      desc="Name, contact info and identification">

      <div class="fields-grid cols-2">
        <app-input
          label="Full Name"
          type="text"
          placeholder="e.g. Sarah Namubiru"
          formControlName="fullName"
          [required]="true"
          [error]="getFieldError('fullName')">
        </app-input>

        <app-input
          label="Email Address"
          type="email"
          placeholder="sarah.n@emtech.co.ug"
          formControlName="email"
          [required]="true"
          [error]="getFieldError('email')">
        </app-input>
      </div>

      <div class="fields-grid cols-2 mt-16">
        <app-input
          label="Phone Number"
          type="tel"
          placeholder="+256 700 000000"
          formControlName="phone"
          [required]="true"
          hint="Valid MTN or Airtel Uganda number — used for OTP delivery"
          [error]="getFieldError('phone')">
        </app-input>

        <div class="input-group">
          <label class="input-label">Gender</label>
          <select class="form-select" formControlName="gender" title="Gender">
            <option *ngFor="let g of genderOptions" [value]="g">{{ g }}</option>
          </select>
        </div>
      </div>

      <div class="fields-grid cols-2 mt-16">
        <app-input
          label="Date of Birth"
          type="date"
          formControlName="dateOfBirth"
          hint="Optional">
        </app-input>

        <app-input
          label="National ID Number"
          type="text"
          placeholder="CF9200000XXX"
          formControlName="nationalId"
          hint="Optional">
        </app-input>
      </div>

    </app-form-section>

    <!-- ── 2. ACCOUNT ACCESS ── -->
    <app-form-section [number]="2" title="Account Access" iconName="lock"
                      desc="Role, credentials and login settings">

      <div class="fields-grid cols-2">
        <div class="input-group">
          <label class="input-label">Role <span class="required">*</span></label>
          <select class="form-select" formControlName="role" title="Role">
            <option value="" disabled>Select a role</option>
            <option *ngFor="let r of roleOptions" [value]="r">{{ r }}</option>
          </select>
          <span class="hint-text">Branch users are created inside each cooperative portal</span>
        </div>
      </div>

      <div class="fields-grid cols-2 mt-16">
        <app-input
          label="Temporary Password"
          type="password"
          placeholder="••••••••"
          formControlName="tempPassword"
          [required]="true"
          [error]="getFieldError('tempPassword')">
        </app-input>

        <app-input
          label="Confirm Temporary Password"
          type="password"
          placeholder="••••••••"
          formControlName="confirmPassword"
          [required]="true"
          [error]="getFieldError('confirmPassword')">
        </app-input>
      </div>

      <div class="mt-16">
        <app-password-strength [password]="currentPassword" [showLabel]="true">
        </app-password-strength>
      </div>

      <div class="mt-16">
        <app-toggle-switch
          label="Require OTP verification on first login"
          description="Recommended — the user must verify their phone number before accessing the platform."
          [(ngModel)]="requireOTP"
          [ngModelOptions]="{standalone: true}">
        </app-toggle-switch>
      </div>

      <div class="mt-16">
        <app-alert variant="warning">
          <p>This user will be prompted to change their temporary password on first login. Ensure the phone number is correct — it is used for OTP delivery.</p>
        </app-alert>
      </div>

    </app-form-section>

  </app-form-shell>

  <!-- ── ACTIONS ── -->
  <div class="form-actions">
    <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
    <app-button type="submit" variant="primary" size="lg"
                [loading]="isLoading" loadingText="Saving...">
      Save User
    </app-button>
  </div>

</form>
