<!-- 
  Add New User Page
  
  Form for creating new users with personal and account details
-->

<div class="page">
  <div class="page-container">
    
    <form [formGroup]="userForm" (ngSubmit)="saveUser()">

      <!-- SECTION 1: PERSONAL DETAILS -->
      <app-info-card title="PERSONAL DETAILS">
        
        <!-- Full Name -->
        <div class="form-row">
          <app-input
            label="Full name"
            type="text"
            placeholder="e.g. Sarah Namubiru"
            formControlName="fullName"
            [required]="true"
            [error]="getFieldError('fullName')">
          </app-input>
        </div>

        <!-- Email & Phone -->
        <div class="form-row form-row-2col">
          <app-input
            label="Email address"
            type="email"
            placeholder="sarah.n@emtech.co.ug"
            formControlName="email"
            [required]="true"
            [error]="getFieldError('email')">
          </app-input>

          <app-input
            label="Phone number"
            type="tel"
            placeholder="+256 700 000000"
            formControlName="phone"
            [required]="true"
            hint="Must be a valid MTN or Airtel Uganda number for OTP delivery"
            [error]="getFieldError('phone')">
          </app-input>
        </div>

        <!-- Date of Birth & National ID -->
        <div class="form-row form-row-2col">
          <app-input
            label="Date of birth"
            type="date"
            placeholder="YYYY-MM-DD"
            formControlName="dateOfBirth"
            hint="Format: YYYY-MM-DD">
          </app-input>

          <app-input
            label="National ID number"
            type="text"
            placeholder="CF9200000XXX"
            formControlName="nationalId">
          </app-input>
        </div>

        <!-- Gender -->
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">Gender</label>
            <select title="gender" class="form-select" formControlName="gender">
              <option *ngFor="let gender of genderOptions" [value]="gender">
                {{ gender }}
              </option>
            </select>
          </div>
        </div>

      </app-info-card>

      <!-- SECTION 2: ACCOUNT ACCESS -->
      <app-info-card title="ACCOUNT ACCESS" >
        
        <!-- Role -->
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">Role <span class="required">*</span></label>
            <select title="role" class="form-select" formControlName="role">
              <!-- Default placeholder option -->
              <option value="" disabled selected>Select a role</option> 
              <option *ngFor="let role of roleOptions" [value]="role">
                {{ role }}
              </option>
            </select>
            <p class="field-note">Branch users are created inside each cooperative portal</p>
          </div>
        </div>


        <!-- Temporary Password & Confirm - USING REUSABLE INPUT COMPONENT -->
        <div class="form-row form-row-2col">
          
          <!-- Temporary Password -->
          <app-input
            label="Temporary password"
            type="password"
            placeholder="••••••••"
            formControlName="tempPassword"
            [required]="true"
            [error]="getFieldError('tempPassword')">
          </app-input>

          <!-- Confirm Password -->
          <app-input
            label="Confirm temporary password"
            type="password"
            placeholder="••••••••"
            formControlName="confirmPassword"
            [required]="true"
            [error]="getFieldError('confirmPassword')">
          </app-input>

        </div>

        <!-- Password Strength Meter -->
        <app-password-strength
          [password]="currentPassword"
          [showLabel]="true">
        </app-password-strength>

        <!-- Toggle Options -->
        <div class="toggles-section">
          
          <!-- Send Welcome Email -->
          <!-- <app-toggle-switch
            label="Send welcome email with login credentials"
            description="The user will receive their temporary password and a link to set a permanent password on first login."
            [(ngModel)]="sendWelcomeEmail"
            [ngModelOptions]="{standalone: true}">
          </app-toggle-switch> -->

          <!-- Require OTP -->
          <app-toggle-switch
            label="Require OTP verification on first login"
            description="Recommended, the user must verify their phone number before accessing the platform."
            [(ngModel)]="requireOTP"
            [ngModelOptions]="{standalone: true}">
          </app-toggle-switch>

        </div>

        <!-- Warning Alert -->
        <app-alert variant="warning">
          <p> This user will be prompted to change their temporary password on first login. Make sure the phone number is correct before saving, it is used for OTP delivery.</p>
        </app-alert>

      </app-info-card>

      <!-- Actions -->
      <div class="form-actions">
        <button 
          type="button"
          class="btn-cancel"
          (click)="cancel()">
          Cancel
        </button>

        <app-button
          type="submit"
          variant="primary"
          size="lg"
          [loading]="isLoading"
          loadingText="Saving...">
          Save user
        </app-button>
      </div>

    </form>

  </div>
</div>
