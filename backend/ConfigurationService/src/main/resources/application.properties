spring.application.name=configuration-service
server.port=8089

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=config
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true


# Config Server
spring.config.import=optional:configserver:http://localhost:8888

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ROOT_USER:minioadmin}
app.minio.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
app.minio.bucket=${MINIO_BUCKET:ugaap-images}


# ADDED: keep connection pool small — Supabase free tier has a shared connection cap
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

