spring.application.name=ugaap
server.port=8081

# ── Datasource ────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.cloud.config.enabled=false
# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# ── Redis ─────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=2000ms

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── Internal service communication ────────────────────────────
app.internal.api-key=${INTERNAL_API_KEY}
app.services.auth-service-url=http://localhost:8081
app.services.membership-service-url=http://localhost:8081

# ── Swagger ───────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.path=/v3/api-docs

# ── Logging ───────────────────────────────────────────────────
logging.level.com.ugaap=DEBUG
logging.level.org.springframework.security=INFO

# ── MinIO ─────────────────────────────────────────────────────
app.minio.endpoint=${MINIO_ENDPOINT}
app.minio.access-key=${MINIO_ROOT_USER}
app.minio.secret-key=${MINIO_ROOT_PASSWORD}
app.minio.bucket=${MINIO_BUCKET}

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB


# ── Eureka ────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.enabled=true