spring.cloud.gateway.routes[5].uri=lb://MEMBERSHIP-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/access/**

# Membership Service - internal endpoints
spring.cloud.gateway.routes[6].id=membership-service-internal
spring.cloud.gateway.routes[6].uri=lb://MEMBERSHIP-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/internal/users/**



# Maker-Checker setup
