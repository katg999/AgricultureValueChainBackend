# Service Identity
spring.application.name=authentication-service
server.port=8081

# Disable config server for now (you can enable later)
spring.cloud.config.enabled=false

# ---------------- DATABASE ----------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

spring.jpa.properties.hibernate.hbm2ddl.import_files_sql_extractor=org.hibernate.tool.schema.internal.script.MultiLineSqlScriptExtractor
# Tell Hibernate to create schemas automatically if they are missing

spring.jpa.properties.hibernate.default_schema=ugaap_auth

# ---------------- REDIS (OTP / sessions) ----------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# ---------------- JWT ----------------
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=86400000
app.jwt.refresh-token-expiry-ms=604800000

# ---------------- INTERNAL COMMUNICATION ----------------
app.internal.api-key=${INTERNAL_API_KEY}

# IMPORTANT: these must point to gateway or eureka services later
app.services.membership-service-url=http://localhost:8082

# ---------------- SWAGGER ----------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ---------------- LOGGING ----------------
logging.level.com.ugaap=DEBUG
logging.level.org.springframework.security=INFO

# ---------------- EUREKA ----------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ---------------- ACTUATOR ----------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Minio (not used by auth service but required by shared MinioConfig)
app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ROOT_USER:minioadmin}
app.minio.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
app.minio.bucket=${MINIO_BUCKET:ugaap-images}


# ---------------- SENDGRID ----------------
# ---------------- SENDGRID ----------------
#sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.api.key=${SENDGRID_API_KEY}
app.mail.from=modrickcharlie@gmail.com


# ADDED: keep connection pool small — Supabase free tier has a shared connection cap
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

